<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POP! Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Margarine&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root {
            --yellow: #FFEB3B;
            --blue: #03A9F4;
            --pink: #E91E63;
            --orange: #FF5722;
            --black: #111111;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--yellow); 
            font-family: 'Margarine', cursive; 
            color: var(--black); 
            background-image: radial-gradient(var(--black) 2px, transparent 2px); 
            background-size: 30px 30px; 
            overflow-x: hidden;
        }
        
        .brutal-border {
            border: 5px solid var(--black);
            box-shadow: 10px 10px 0 var(--black);
            transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .brutal-border:hover {
            transform: translate(-4px, -4px);
            box-shadow: 14px 14px 0 var(--black);
        }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 25px 60px; background: #fff; border-bottom: 5px solid var(--black); position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Pacifico', cursive; font-size: 2.8rem; color: var(--pink); text-shadow: 4px 4px 0 var(--black); transform: rotate(-2deg); }
        .nav-links { display: flex; gap: 40px; align-items: center; }
        .nav-links a { color: var(--black); text-decoration: none; font-size: 1.6rem; text-transform: uppercase; transition: 0.2s; }
        .nav-links a:hover { color: var(--blue); transform: scale(1.1) rotate(2deg); display: inline-block; }
        
        .hero { padding: 120px 50px; text-align: center; background: var(--blue); border-bottom: 5px solid var(--black); position: relative; overflow: hidden; }
        .hero::after { content: ''; position: absolute; width: 200vw; height: 100%; background: repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(0,0,0,0.1) 40px, rgba(0,0,0,0.1) 80px); top: 0; left: -50vw; z-index: 0; animation: slideBg 20s linear infinite; }
        @keyframes slideBg { from { transform: translateX(0); } to { transform: translateX(50vw); } }
        
        .hero-content { position: relative; z-index: 10; }
        .hero h1 { font-size: 6rem; color: #fff; text-shadow: 6px 6px 0 var(--black); margin-bottom: 25px; transform: rotate(-3deg); letter-spacing: 2px; }
        .hero .btn { background: var(--orange); color: #fff; padding: 15px 50px; font-size: 1.8rem; text-transform: uppercase; text-decoration: none; display: inline-block; margin-top: 40px; transform: rotate(1deg); }
        .hero .btn:hover { background: var(--pink); color: var(--yellow); }
        
        .products { padding: 100px 60px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 50px; }
        .card { background: #fff; padding: 25px; position: relative; transform: rotate(-1deg); }
        .card:nth-child(even) { transform: rotate(1.5deg); }
        .card img { width: 100%; height: 280px; object-fit: cover; border: 5px solid var(--black); margin-bottom: 25px; filter: contrast(120%) saturate(150%); }
        .card h3 { font-size: 2.2rem; margin-bottom: 15px; color: var(--pink); line-height: 1.2; }
        .card .price { font-size: 2rem; background: var(--yellow); display: inline-block; padding: 5px 20px; border: 4px solid var(--black); margin-bottom: 25px; transform: rotate(4deg); box-shadow: 4px 4px 0 var(--black); }
        
        /* Speech Bubble Animation */
        .bubble { position: absolute; top: -40px; right: -30px; background: #fff; border: 5px solid var(--black); border-radius: 50%; padding: 25px 20px; font-family: 'Pacifico', cursive; font-size: 1.8rem; color: var(--blue); transform: scale(0); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10; box-shadow: 5px 5px 0 var(--black); text-align: center; line-height: 1; }
        .bubble::after { content: ''; position: absolute; bottom: -15px; left: 20px; border-width: 15px 15px 0 0; border-style: solid; border-color: #fff transparent transparent transparent; z-index: 2; }
        .bubble::before { content: ''; position: absolute; bottom: -22px; left: 16px; border-width: 20px 20px 0 0; border-style: solid; border-color: var(--black) transparent transparent transparent; z-index: 1; }
        .card:hover .bubble { transform: scale(1) rotate(15deg); }
        
        footer { background: var(--pink); border-top: 5px solid var(--black); padding: 50px; text-align: center; color: #fff; font-size: 1.8rem; text-shadow: 3px 3px 0 var(--black); }
    </style>
</head>
<body>
    <nav>
        <div class="logo">POP! Boutique</div>
        <div class="nav-links">
            <a href="#">New Drops</a>
            <a href="#">Apparel</a>
            <a href="#">Accessories</a>
            <a href="#" class="brutal-border" style="padding: 10px 25px; background: var(--yellow); transform: rotate(2deg);">Bag (0)</a>
        </div>
    </nav>
    <header class="hero brutal-border" style="margin: 50px; box-shadow: 20px 20px 0 var(--black);">
        <div class="hero-content">
            <h1>STAND OUT!</h1>
            <p style="font-size: 2.2rem; color: #fff; text-shadow: 3px 3px 0 var(--black); background: var(--black); display: inline-block; padding: 10px 20px; transform: rotate(1deg);">Vibrant Fashion for Bold Personalities</p><br>
            <a href="#" class="btn brutal-border">Shop Now &rarr;</a>
        </div>
    </header>
    <section class="products">
        <h2 style="font-size: 4.5rem; text-align: center; margin-bottom: 80px; text-shadow: 5px 5px 0 var(--black); color: var(--orange); transform: rotate(-2deg); background: #fff; display: inline-block; padding: 10px 40px; border: 5px solid var(--black); box-shadow: 10px 10px 0 var(--black);">Trending Now</h2>
        <div class="grid">
            <div class="card brutal-border">
                <div class="bubble">WOW!</div>
                <img src="https://images.unsplash.com/photo-1520975954732-57dd22299614?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Jacket">
                <h3>Neon Rain Jacket</h3>
                <div class="price">$120</div>
                <a href="#" class="btn brutal-border" style="display: block; text-align: center; background: var(--blue); color: #fff; text-decoration: none; padding: 12px; font-size: 1.6rem; text-transform: uppercase;">Gimme!</a>
            </div>
            <div class="card brutal-border">
                <div class="bubble">BAM!</div>
                <img src="https://images.unsplash.com/photo-1549298916-b41d501d3772?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Sneakers">
                <h3>Chunky High Tops</h3>
                <div class="price">$95</div>
                <a href="#" class="btn brutal-border" style="display: block; text-align: center; background: var(--pink); color: #fff; text-decoration: none; padding: 12px; font-size: 1.6rem; text-transform: uppercase;">Gimme!</a>
            </div>
            <div class="card brutal-border">
                <div class="bubble">POP!</div>
                <img src="https://images.unsplash.com/photo-1513094735237-8f2714d57c13?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Bag">
                <h3>Vinyl Tote Bag</h3>
                <div class="price">$45</div>
                <a href="#" class="btn brutal-border" style="display: block; text-align: center; background: var(--orange); color: #fff; text-decoration: none; padding: 12px; font-size: 1.6rem; text-transform: uppercase;">Gimme!</a>
            </div>
        </div>
    </section>
    <footer>
        Make it POP! &copy; 2026
    </footer>
</body>
</html>
